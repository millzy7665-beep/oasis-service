<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a1e2e">
  <title>Oasis Recovery</title>
  <style>
    :root {
      --navy: #0a1e2e;
      --ocean: #2a627e;
      --gold: #c9a87c;
      --paper: #f6f1e8;
      --text: #1e2a33;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top right, rgba(201, 168, 124, 0.18), transparent 30%),
        linear-gradient(160deg, var(--navy), #13324a 55%, var(--ocean));
      color: var(--paper);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: min(100%, 420px);
      background: rgba(10, 30, 46, 0.86);
      border: 1px solid rgba(201, 168, 124, 0.3);
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(10px);
    }

    .eyebrow {
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      font-weight: 400;
      letter-spacing: 0.08em;
    }

    p {
      margin: 0 0 16px;
      line-height: 1.5;
      font-size: 15px;
      color: rgba(246, 241, 232, 0.88);
    }

    .status {
      margin: 18px 0 20px;
      padding: 14px 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(201, 168, 124, 0.18);
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 140px;
    }

    .btn-primary {
      background: var(--gold);
      color: var(--navy);
      font-weight: 700;
    }

    .btn-secondary {
      background: transparent;
      color: var(--paper);
      border: 1px solid rgba(246, 241, 232, 0.28);
    }

    .small {
      margin-top: 14px;
      font-size: 12px;
      color: rgba(246, 241, 232, 0.66);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Oasis Recovery</div>
    <h1>Clean Browser Launch</h1>
    <p>This page removes the old Oasis service worker and browser cache first, then opens a browser-safe version of the app.</p>
    <div id="status" class="status">Preparing recovery…</div>
    <div class="actions">
      <a id="open-link" class="btn btn-primary" href="./index.html?v=262&nosw=1&resetPush=1">Open Oasis</a>
      <button id="retry-btn" class="btn btn-secondary" type="button">Run Recovery Again</button>
    </div>
    <div class="small">If Safari would not open the main app link before, open this page first.</div>
  </div>

  <script>
    async function runRecovery() {
      const status = document.getElementById('status');
      const openLink = document.getElementById('open-link');
      const targetUrl = './index.html?v=262&nosw=1&resetPush=1';
      openLink.href = targetUrl;

      const notes = [];
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(registration => registration.unregister()));
          notes.push(`Removed ${registrations.length} service worker${registrations.length === 1 ? '' : 's'}`);
        } else {
          notes.push('No service workers found');
        }

        if ('caches' in window) {
          const cacheKeys = await caches.keys();
          await Promise.all(cacheKeys.map(key => caches.delete(key)));
          notes.push(`Cleared ${cacheKeys.length} cache bucket${cacheKeys.length === 1 ? '' : 's'}`);
        } else {
          notes.push('No browser cache API found');
        }

        status.textContent = `${notes.join(' • ')}. Use Open Oasis now.`;
      } catch (error) {
        console.error('Recovery failed', error);
        status.textContent = 'Recovery hit an error, but you can still try Open Oasis now.';
      }
    }

    document.getElementById('retry-btn').addEventListener('click', runRecovery);
    runRecovery();
  </script>
</body>
</html>
