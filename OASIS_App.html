  // ── readings grid ──
  _readingsGrid(woId, zone, readings, canEdit) {
    const params = [
      { k:'ph',         label:'pH',             unit:'',    hint:'7.2 – 7.6' },
      { k:'chlorine',   label:'Free Chlorine',  unit:'ppm', hint:'1 – 3' },
      { k:'alkalinity', label:'Alkalinity',     unit:'ppm', hint:'80 – 120' },
      { k:'calcium',    label:'Calcium Hard.',  unit:'ppm', hint:'200 – 400' },
      { k:'cya',        label:'Cyanuric Acid',  unit:'ppm', hint:'30 – 50' },
      { k:'salt',       label:'Salt',           unit:'ppm', hint:'2700 – 3400' },
    ];
    return `<div class="wo-grid">
      ${params.map(p => `
        <div class="wo-fld">
          <div class="wo-fld-lbl">${p.label} <span class="wo-unit">${p.unit}</span></div>
          ${canEdit
            ? `<input class="form-control wo-fld-inp" type="number" step="0.1"
                 value="${readings[p.k]||''}" placeholder="—"
                 onblur="app._saveReading('${woId}','${zone}','${p.k}',this.value)">`
            : `<div class="wo-fld-inp" style="padding:5px 7px;font-size:17px;font-weight:600;color:var(--navy)">${readings[p.k]||'—'}</div>`
          }
          <div class="wo-fld-hint">${p.hint}</div>
        </div>`).join('')}
    </div>`;
  },

  _saveReading(woId, zone, key, value) {
    const orders = db.get('workorders', []);
    const wo     = orders.find(o => o.id === woId);
    if (!wo) return;
    wo.readings[zone][key] = value;
    db.set('workorders', orders);
    // Refresh dosing section live
    const el = document.getElementById('dosing-bd');
    if (el) el.innerHTML = this._renderDosing(wo);
  },

  _saveField(woId, field, value) {
    const orders = db.get('workorders', []);
    const wo     = orders.find(o => o.id === woId);
    if (!wo) return;
    wo[field] = value;
    db.set('workorders', orders);
    if (field === 'status') showToast(`Status → ${value}`);
  },

  _toggleSpa(woId) {
    const orders = db.get('workorders', []);
    const wo     = orders.find(o => o.id === woId);
    if (!wo) return;
    wo._showSpa = !wo._showSpa;
    db.set('workorders', orders);
    this.openWorkOrder(woId);
  },

  // ── dosing calculator ──
  _renderDosing(wo) {
    const r    = wo.readings?.pool || {};
    const size = parseFloat(wo._poolSize) || 15000;
    const ph   = parseFloat(r.ph);
    const cl   = parseFloat(r.chlorine);
    const alk  = parseFloat(r.alkalinity);
    const ca   = parseFloat(r.calcium);
    const cya  = parseFloat(r.cya);

    if (!r.ph && !r.chlorine && !r.alkalinity) {
      return `<div class="dosing-empty">
        <span style="font-size:36px">🧪</span>
        <div>Enter pool readings above to see dosing recommendations</div>
      </div>`;
    }

    const items = [];

    // pH
    if (!isNaN(ph)) {
      if (ph < 7.2) {
        const oz = Math.round(((7.4-ph)/0.2) * (size/10000) * 6);
        items.push({ t:'low', icon:'⬆️', chem:'Soda Ash (pH+)', add:`≈ ${oz} oz`, note:`pH ${ph} → target 7.2–7.6` });
      } else if (ph > 7.6) {
        const qt = Math.round(((ph-7.4)/0.2) * (size/10000) * 0.5 * 10)/10;
        items.push({ t:'high', icon:'⬇️', chem:'Muriatic Acid (pH−)', add:`≈ ${qt} qt`, note:`pH ${ph} → target 7.2–7.6` });
      }
    }
    // Chlorine
    if (!isNaN(cl)) {
      if (cl < 1) {
        const tabs = Math.max(1, Math.ceil(size/10000));
        items.push({ t:'low', icon:'⬆️', chem:'Chlorine Tablets', add:`${tabs} tablet${tabs>1?'s':''}`, note:`Free Cl ${cl} ppm → target 1–3 ppm` });
      } else if (cl > 5) {
        items.push({ t:'high', icon:'⬇️', chem:'Allow to off-gas / dilute', add:'Withhold treatment', note:`Free Cl ${cl} ppm → target 1–3 ppm` });
      }
    }
    // Alkalinity
    if (!isNaN(alk)) {
      if (alk < 80) {
        const lbs = Math.round((80-alk)/10 * (size/10000) * 1.4 * 10)/10;
        items.push({ t:'low', icon:'⬆️', chem:'Sodium Bicarbonate', add:`≈ ${lbs} lb`, note:`Alk ${alk} ppm → target 80–120 ppm` });
      } else if (alk > 120) {
        items.push({ t:'high', icon:'⬇️', chem:'Muriatic Acid', add:'Lower carefully', note:`Alk ${alk} ppm → target 80–120 ppm` });
      }
    }
    // Calcium
    if (!isNaN(ca)) {
      if (ca < 200) {
        const lbs = Math.round((200-ca)/10 * (size/10000) * 1.25 * 10)/10;
        items.push({ t:'low', icon:'⬆️', chem:'Calcium Chloride', add:`≈ ${lbs} lb`, note:`Ca ${ca} ppm → target 200–400 ppm` });
      } else if (ca > 400) {
        items.push({ t:'high', icon:'⬇️', chem:'Partial drain & refill', add:'Dilution needed', note:`Ca ${ca} ppm → target 200–400 ppm` });
      }
    }
    // CYA
    if (!isNaN(cya)) {
      if (cya < 30) {
        const lbs = Math.round((30-cya)/10 * (size/10000) * 1.5 * 10)/10;
        items.push({ t:'low', icon:'⬆️', chem:'Cyanuric Acid (Stabilizer)', add:`≈ ${lbs} lb`, note:`CYA ${cya} ppm → target 30–50 ppm` });
      } else if (cya > 80) {
        items.push({ t:'high', icon:'⬇️', chem:'Partial drain & refill', add:'Dilution needed', note:`CYA ${cya} ppm → target 30–50 ppm` });
      }
    }

    // Langelier Saturation Index
    let lsiHTML = '';
    if (!isNaN(ph) && !isNaN(alk) && !isNaN(ca) && ph && alk && ca) {
      const tf  = 0.188 * (Math.log10(80) - 1) + 0.7;        // ~80°F constant
      const lsi = Math.round((ph + tf + Math.log10(ca/100) + Math.log10(alk/10) - 12.1) * 100) / 100;
      const cls  = Math.abs(lsi) <= 0.3 ? 'lsi-ok' : Math.abs(lsi) <= 0.5 ? 'lsi-warn' : 'lsi-bad';
      const bdg  = cls.replace('lsi-','lsi-bdg-');
      const label = Math.abs(lsi) <= 0.3 ? 'Balanced' : lsi > 0 ? 'Scaling Risk' : 'Corrosive';
      const pct  = Math.min(100, Math.max(0, (lsi + 1.5) / 3 * 100));
      lsiHTML = `
        <div class="lsi-box ${cls}">
          <div class="lsi-main">
            <div>
              <div class="lsi-val">${lsi > 0 ? '+' : ''}${lsi}</div>
              <div class="lsi-name">Langelier Saturation Index</div>
            </div>
            <div class="lsi-badge ${bdg}">${label}</div>
          </div>
          <div class="lsi-track"><div class="lsi-dot" style="left:${pct}%"></div></div>
          <div class="lsi-labels"><span>−2 Corrosive</span><span>0 Ideal</span><span>+2 Scaling</span></div>
          <div class="lsi-ideal">Ideal range: −0.3 to +0.3</div>
        </div>`;
    }

    const dosingHTML = items.length === 0
      ? `<div class="dosing-all-ok">✓ All readings in range — no adjustments needed</div>`
      : `<div class="dosing-hdr">Recommended Adjustments</div>
         ${items.map(item => `
           <div class="dosing-item dosing-${item.t}">
             <div class="dosing-top"><span>${item.icon}</span> <strong>${item.chem}</strong></div>
             <div class="dosing-add">${item.add}</div>
             <div class="dosing-note">${item.note}</div>
           </div>`).join('')}`;

    return lsiHTML + dosingHTML;
  },

  // ── chemicals ──
  _renderChemicals(woId, chems, canEdit) {
    const list = chems.length
      ? chems.map((c, i) => `
          <div style="display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--gray-100)">
            <div style="flex:1">
              <div style="font-size:14px;font-weight:600;color:var(--navy)">${c.name}</div>
              <div style="font-size:12px;color:var(--gray-400)">${c.amount} ${c.unit}</div>
            </div>
            ${canEdit ? `<button onclick="app._removeChem('${woId}',${i})"
              style="background:none;border:none;color:var(--gray-400);cursor:pointer;font-size:20px;line-height:1">×</button>` : ''}
          </div>`).join('')
      : `<div style="font-size:13px;color:var(--gray-400);padding:8px 0">No chemicals logged yet</div>`;

    const addForm = canEdit ? `
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px;margin-top:12px">
        <input class="form-control" id="chem-name" placeholder="Chemical name">
        <input class="form-control" id="chem-amt"  placeholder="Amt" type="number" step="0.5">
        <select class="form-control" id="chem-unit">
          <option>oz</option><option>lb</option><option>qt</option><option>gal</option><option>tab</option><option>bag</option>
        </select>
      </div>
      <button class="btn btn-secondary" style="margin-top:8px;width:100%" onclick="app._addChem('${woId}')">+ Log Chemical</button>` : '';

    return `<div id="chem-list">${list}</div>${addForm}`;
  },

  _addChem(woId) {
    const name = (document.getElementById('chem-name')?.value||'').trim();
    const amt  = document.getElementById('chem-amt')?.value;
    const unit = document.getElementById('chem-unit')?.value || 'oz';
    if (!name || !amt) { showToast('Enter chemical name and amount'); return; }
    const orders = db.get('workorders', []);
    const wo     = orders.find(o => o.id === woId);
    if (!wo) return;
    wo.chemicals = wo.chemicals || [];
    wo.chemicals.push({ name, amount: amt, unit });
    db.set('workorders', orders);
    // Refresh chemicals section
    const bd = document.getElementById('chems-bd');
    if (bd) bd.innerHTML = this._renderChemicals(woId, wo.chemicals, true);
    showToast('Chemical logged ✓');
  },

  _removeChem(woId, idx) {
    const orders = db.get('workorders', []);
    const wo     = orders.find(o => o.id === woId);
    if (!wo) return;
    wo.chemicals.splice(idx, 1);
    db.set('workorders', orders);
    const bd = document.getElementById('chems-bd');
    if (bd) bd.innerHTML = this._renderChemicals(woId, wo.chemicals, true);
  },

  // ── photos ──
  _renderPhotos(woId, photos, canEdit) {
    const slots = [
      { key:'before', label:'Before' },
      { key:'after',  label:'After'  },
      { key:'extra1', label:'Issue / Extra' },
      { key:'extra2', label:'Issue / Extra' },
    ];
    return `
      <div class="photo-ba-row">
        ${slots.slice(0,2).map(s => this._photoSlot(woId, s, photos[s.key], canEdit)).join('')}
      </div>
      <div class="photo-extra-grid">
        ${slots.slice(2).map(s => this._photoSlot(woId, s, photos[s.key], canEdit)).join('')}
      </div>`;
  },

  _photoSlot(woId, slot, dataUrl, canEdit) {
    return `<div class="photo-slot">
      <div class="photo-slot-lbl">${slot.label}</div>
      <div class="photo-preview-box">
        ${dataUrl
          ? `<img src="${dataUrl}" class="photo-thumb" onclick="app._viewPhoto('${woId}','${slot.key}')">
             ${canEdit ? `<button class="photo-remove" onclick="app._removePhoto('${woId}','${slot.key}')">×</button>` : ''}`
          : canEdit
            ? `<div class="photo-picker-options">
                 <div class="photo-picker-title">${slot.label}</div>
                 <div class="photo-picker-actions">
                   <label class="photo-source-btn">📷 Camera
                     <input type="file" accept="image/*" capture="environment" class="photo-file-inp"
                       onchange="app._handlePhoto('${woId}','${slot.key}',this)">
                   </label>
                   <label class="photo-source-btn">🖼️ Gallery
                     <input type="file" accept="image/*" class="photo-file-inp"
                       onchange="app._handlePhoto('${woId}','${slot.key}',this)">
                   </label>
                 </div>
               </div>`
            : `<span style="color:var(--gray-300);font-size:28px">📷</span>`
        }
      </div>
    </div>`;
  },

  _handlePhoto(woId, key, input) {
    const file = input.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const orders = db.get('workorders', []);
      const wo     = orders.find(o => o.id === woId);
      if (!wo) return;
      wo.photos       = wo.photos || {};
      wo.photos[key]  = e.target.result;
      db.set('workorders', orders);
      showToast('Photo saved ✓');
      const bd = document.getElementById('photos-bd');
      if (bd) bd.innerHTML = this._renderPhotos(woId, wo.photos, true);
    };
    reader.readAsDataURL(file);
  },

  _removePhoto(woId, key) {
    const orders = db.get('workorders', []);
    const wo     = orders.find(o => o.id === woId);
    if (!wo) return;
    delete wo.photos[key];
    db.set('workorders', orders);
    const bd = document.getElementById('photos-bd');
    if (bd) bd.innerHTML = this._renderPhotos(woId, wo.photos, true);
  },

  _viewPhoto(woId, key) {
    const orders = db.get('workorders', []);
    const wo     = orders.find(o => o.id === woId);
    if (!wo?.photos?.[key]) return;
    modal.open('Photo', `<img src="${wo.photos[key]}" style="width:100%;border-radius:8px">`,
      null, 'Close', true);
  },

  async _deleteWorkOrder(id) {
    const ok = await confirmDialog('Delete this work order?');
    if (!ok) return;
    db.set('workorders', db.get('workorders',[]).filter(o => o.id !== id));
    showToast('Work order deleted');
    this.renderWorkOrders();
  },

  // ─────────────────────────────────────────────
  //  PDF REPORT
  // ─────────────────────────────────────────────
  generatePDF(id) {
    const orders = db.get('workorders', []);
    const wo     = orders.find(o => o.id === id);
    if (!wo) return;

    if (typeof window.jspdf === 'undefined') {
      showToast('PDF library not loaded — check connection');
      return;
    }

    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
      const W = 210, M = 20;

      // ── Header ──
      doc.setFillColor(10, 30, 46);
      doc.rect(0, 0, W, 42, 'F');

      doc.setTextColor(212, 201, 187);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(26);
      doc.text('OASIS', M, 18);

      doc.setFontSize(8);
      doc.setFont('helvetica', 'normal');
      doc.setLetterSpacing(1.5);
      doc.text('LUXURY POOL & WATERSHAPE SERVICE', M, 26);
      doc.text('SERVICE REPORT', M, 33);
      doc.setLetterSpacing(0);

      doc.setTextColor(255, 255, 255);
      doc.setFontSize(10);
      doc.text(wo.date, W - M, 20, { align:'right' });
      if (wo.time) doc.text(wo.time, W - M, 27, { align:'right' });

      // ── Client block ──
      let y = 54;
      doc.setTextColor(26, 64, 95);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(15);
      doc.text(wo.clientName, M, y); y += 7;

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(10);
      doc.setTextColor(90, 80, 72);
      doc.text(wo.address, M, y); y += 6;
      if (wo.type)     doc.text(`Type: ${wo.type}`, M, y), y += 6;
      if (wo.techName) doc.text(`Technician: ${wo.techName}`, M, y), y += 6;

      // Status pill
      const statusColors = { completed:[42,122,79], 'in-progress':[34,102,131], pending:[154,111,30], cancelled:[150,150,150] };
      const [sr,sg,sb] = statusColors[wo.status] || statusColors.pending;
      doc.setFillColor(sr,sg,sb);
      doc.roundedRect(W-60, 50, 40, 12, 3, 3, 'F');
      doc.setTextColor(255,255,255);
      doc.setFontSize(8);
      doc.setFont('helvetica','bold');
      doc.text((wo.status||'PENDING').toUpperCase(), W-40, 57.5, {align:'center'});

      // ── Divider ──
      y += 4;
      doc.setDrawColor(212,201,187);
      doc.line(M, y, W-M, y); y += 10;

      // ── Pool readings ──
      doc.setTextColor(26,64,95);
      doc.setFont('helvetica','bold');
      doc.setFontSize(11);
      doc.text('POOL READINGS', M, y); y += 7;

      const params = [
        ['pH',                    wo.readings.pool.ph,          '7.2–7.6'],
        ['Free Chlorine (ppm)',    wo.readings.pool.chlorine,    '1–3'],
        ['Total Alkalinity (ppm)', wo.readings.pool.alkalinity,  '80–120'],
        ['Calcium Hardness (ppm)', wo.readings.pool.calcium,     '200–400'],
        ['Cyanuric Acid (ppm)',    wo.readings.pool.cya,         '30–50'],
        ['Salt (ppm)',             wo.readings.pool.salt,        '2700–3400'],
      ];
      doc.setFont('helvetica','normal');
      doc.setFontSize(9);
      params.forEach(([label, val, ideal]) => {
        if (!val) return;
        doc.setTextColor(90,80,72);  doc.text(label, M, y);
        doc.setTextColor(26,64,95);  doc.setFont('helvetica','bold');  doc.text(val.toString(), 115, y);
        doc.setTextColor(140,130,120); doc.setFont('helvetica','normal'); doc.text(`(${ideal})`, 145, y);
        y += 7;
      });

      // Spa readings
      const spaHasData = Object.values(wo.readings.spa||{}).some(Boolean);
      if (spaHasData) {
        y += 4;
        doc.setTextColor(26,64,95);
        doc.setFont('helvetica','bold'); doc.setFontSize(11);
        doc.text('SPA / HOT TUB READINGS', M, y); y += 7;
        params.forEach(([label, , ideal], idx) => {
          const spaKeys = ['ph','chlorine','alkalinity','calcium','cya','salt'];
          const val = wo.readings.spa[spaKeys[idx]];
          if (!val) return;
          doc.setFont('helvetica','normal'); doc.setFontSize(9);
          doc.setTextColor(90,80,72);  doc.text(label, M, y);
          doc.setTextColor(26,64,95);  doc.setFont('helvetica','bold'); doc.text(val.toString(), 115, y);
          doc.setTextColor(140,130,120); doc.setFont('helvetica','normal'); doc.text(`(${ideal})`, 145, y);
          y += 7;
        });
      }

      // ── Chemicals ──
      if (wo.chemicals?.length) {
        y += 4;
        doc.setDrawColor(212,201,187); doc.line(M, y, W-M, y); y += 8;
        doc.setTextColor(26,64,95); doc.setFont('helvetica','bold'); doc.setFontSize(11);
        doc.text('CHEMICALS ADDED', M, y); y += 7;
        wo.chemicals.forEach(c => {
          doc.setFont('helvetica','normal'); doc.setFontSize(9);
          doc.setTextColor(90,80,72);
          doc.text(`• ${c.name}: ${c.amount} ${c.unit}`, M, y); y += 6;
        });
      }

      // ── Notes ──
      if (wo.notes) {
        y += 4;
        doc.setDrawColor(212,201,187); doc.line(M, y, W-M, y); y += 8;
        doc.setTextColor(26,64,95); doc.setFont('helvetica','bold'); doc.setFontSize(11);
        doc.text('NOTES', M, y); y += 7;
        doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(90,80,72);
        const lines = doc.splitTextToSize(wo.notes, W - M*2);
        doc.text(lines, M, y); y += lines.length * 5.5;
      }

      // ── Footer ──
      doc.setFillColor(10,30,46);
      doc.rect(0, 282, W, 15, 'F');
      doc.setTextColor(212,201,187); doc.setFontSize(8); doc.setFont('helvetica','normal');
      doc.text('OASIS Luxury Pool & Watershape Service', M, 290);
      doc.text(`Generated ${new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`,
        W-M, 290, {align:'right'});

      doc.save(`OASIS_${wo.clientName.replace(/\s+/g,'-')}_${wo.date}.pdf`);
      showToast('📄 PDF saved to device');
    } catch(err) {
      console.error('PDF error:', err);
      showToast('PDF failed — check console');
    }
  },


  // ─────────────────────────────────────────────
  //  LEGACY SEND / SHARE ACTIONS → PDF ONLY
  // ─────────────────────────────────────────────
  shareReport(id) {
    return this.generatePDF(id);
  },

  sendReport(id) {
    return this.generatePDF(id);
  },

  // ─────────────────────────────────────────────
  //  SETTINGS
  // ─────────────────────────────────────────────
  renderSettings() {
    const user = auth.user();
    this.setContent(`
      <div class="section-header">
        <div class="section-title">Settings</div>
      </div>

      <div class="card">
        <div class="card-header"><div class="card-title">Account</div></div>
        <div class="card-body">
          <div class="detail-row"><span class="detail-label">Name</span><span class="detail-value">${user.name}</span></div>
          <div class="detail-row"><span class="detail-label">Role</span><span class="detail-value" style="text-transform:capitalize">${user.role}</span></div>
        </div>
      </div>

      ${auth.isAdmin() ? `
      <div class="card">
        <div class="card-header"><div class="card-title">Team</div></div>
        <div class="card-body">
          ${Object.entries(USERS).filter(([k])=>k!=='admin').map(([,v]) => `
            <div class="detail-row"><span class="detail-label">${v.name}</span><span class="detail-value" style="color:var(--teal)">Technician</span></div>
          `).join('')}
        </div>
      </div>

      <div class="card">
        <div class="card-header"><div class="card-title">Data Overview</div></div>
        <div class="card-body">
          <div class="detail-row"><span class="detail-label">Clients</span><span class="detail-value">${db.get('clients',[]).length}</span></div>
          <div class="detail-row"><span class="detail-label">Work Orders</span><span class="detail-value">${db.get('workorders',[]).length}</span></div>
          <div class="detail-row"><span class="detail-label">Routes</span><span class="detail-value">${db.get('routes',[]).length}</span></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><div class="card-title">Danger Zone</div></div>
        <div class="card-body">
          <div style="font-size:12px;color:var(--gray-500);margin-bottom:10px">Clearing data is permanent and cannot be undone.</div>
          <button class="btn btn-danger btn-sm" onclick="app._clearData()">Clear All Data</button>
        </div>
      </div>` : ''}

      <div class="card">
        <div class="card-body">
          <button class="btn btn-danger" style="width:100%" onclick="signOut()">Sign Out</button>
        </div>
      </div>
    `);
  },

  async _clearData() {
    const ok = await confirmDialog('Clear ALL clients, routes, and work orders? This cannot be undone.', 'Clear All', 'btn-danger');
    if (!ok) return;
    db.remove('clients');
    db.remove('workorders');
    db.remove('routes');
    showToast('All data cleared');
    this.renderSettings();
  }
};

// ══════════════════════════════════════════════════
//  GLOBALS expected by index.html
// ══════════════════════════════════════════════════
function signOut() {
  auth.logout();
  location.reload();
}

// Expose for inline onclick in html
window.app    = app;
window.router = app;   // legacy compat

document.addEventListener('DOMContentLoaded', () => app.init());

  </script>
