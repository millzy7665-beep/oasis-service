<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a1e2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OASIS Service">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <title>OASIS — Service</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>

  <link rel="stylesheet" href="styles.css?v=30">

  <style>
    /* Critical overrides for luxury feel */
    .login-logo {
      width: 120px;
      height: auto;
      margin: 0 auto 24px;
      display: block;
      mix-blend-mode: screen;
    }
    .login-brand {
      color: #c9a87c !important;
    }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="login-screen">
    <div class="login-bg"></div>
    <div class="login-card">
      <img class="login-logo" src="oasis-logo.png" alt="OASIS">
      <div class="login-brand">OASIS</div>
      <div class="login-tagline">Luxury Pool &amp; Watershape Service</div>
      <form id="login-form" class="login-form">
        <div class="login-field-group">
          <label class="login-label">Select Your Name</label>
          <select id="login-tech" required>
            <option value="">— Select your name —</option>
            <option value="t1">Ace</option>
            <option value="t2">Ariel</option>
            <option value="t3">Donald</option>
            <option value="t4">Elvin</option>
            <option value="t5">Jermaine</option>
            <option value="t6">Kadeem</option>
            <option value="t7">Kingsley</option>
            <option value="t8">Malik</option>
            <option value="t9">Jet</option>
            <option value="t10">Mark</option>
            <option value="admin">Chris Mills</option>
          </select>
        </div>
        <div class="login-field-group">
          <label class="login-label">Enter PIN</label>
          <input type="password" id="login-pin" required maxlength="4" inputmode="numeric" pattern="[0-9]*" placeholder="••••" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 18px; text-align: center; letter-spacing: 4px;">
        </div>
        <button type="submit" class="btn-login">Sign In</button>
        <div id="login-error" class="login-error" style="display:none">Invalid name or PIN.</div>
      </form>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" class="hidden">
    <div id="app-shell">
      <header class="app-header">
        <div class="header-left">
          <img class="header-logo-icon" src="oasis-logo.png" alt="OASIS" style="height: 36px; mix-blend-mode: screen;">
          <div class="header-sub">Elevate Your Outdoor Living Space</div>
        </div>
        <div id="header-actions" class="header-actions">
          <button class="signout-btn" onclick="auth.logout(); location.reload();">Sign Out</button>
        </div>
      </header>
      <main id="main-content" class="main-content"></main>
      <nav class="bottom-nav">
        <button class="nav-item active" data-view="dashboard" onclick="router.navigate('dashboard')">
          <span class="nav-icon">🏠</span><span class="nav-label">Home</span>
        </button>
        <button class="nav-item" data-view="routes" onclick="router.navigate('routes')">
          <span class="nav-icon">🗺️</span><span class="nav-label">Routes</span>
        </button>
        <button class="nav-item" data-view="clients" onclick="router.navigate('clients')">
          <span class="nav-icon">👥</span><span class="nav-label">Clients</span>
        </button>
        <button class="nav-item" data-view="workorders" onclick="router.navigate('workorders')">
          <span class="nav-icon">📋</span><span class="nav-label">Work Orders</span>
        </button>
        <button class="nav-item" data-view="settings" onclick="router.navigate('settings')">
          <span class="nav-icon">⚙️</span><span class="nav-label">Settings</span>
        </button>
      </nav>
    </div>

    <!-- Modal placeholders (maintained from app.js expectation) -->
    <div id="modal-overlay" class="modal-overlay hidden">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modal-title"></h2>
          <button class="modal-close" id="modal-close-btn">&times;</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="modal-cancel-btn">Cancel</button>
          <button class="btn btn-primary" id="modal-save-btn">Save</button>
        </div>
      </div>
    </div>

    <div id="confirm-overlay" class="modal-overlay hidden">
      <div class="modal modal-sm">
        <div class="modal-header"><h2 id="confirm-title">Confirm</h2></div>
        <div class="modal-body"><p id="confirm-message"></p></div>
        <div class="modal-footer">
          <button class="btn btn-secondary" id="confirm-cancel-btn">Cancel</button>
          <button class="btn btn-danger" id="confirm-ok-btn">Delete</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>
  </div>

  <script src="tech-catalog.js?v=50"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="app.js?v=50"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').then(registration => {
          console.log('SW registered: ', registration);
        }).catch(registrationError => {
          console.log('SW registration failed: ', registrationError);
        });
      });
    }
  </script>
</body>
</html>
